<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>sqoutiq — Map Insights</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>try{if(localStorage.getItem('sqoutiq-theme')==='light')document.documentElement.classList.add('light-mode')}catch(e){}</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c10;--surface:#161821;--surface2:#1d1f2b;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f3f4f6;--muted:#9ca3af;--muted2:#6b7280;--accent:#9b51e0;--accent-dim:rgba(155,81,224,0.15);--accent-dim2:rgba(155,81,224,0.08);--blue:#00a8cc;--blue-dim:rgba(0,168,204,0.15);--amber:#f59e0b;--amber-dim:rgba(245,158,11,0.15);--green:#10b981;--green-dim:rgba(16,185,129,0.15);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
:root.light-mode{--bg:#f0f2f5;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--border2:#cbd5e1;--text:#0f172a;--muted:#64748b;--muted2:#94a3b8;--accent:#7c3aed;--accent-dim:rgba(124,58,237,.10);--accent-dim2:rgba(124,58,237,.05);--blue:#0284c7;--blue-dim:rgba(2,132,199,.10);--amber:#b45309;--amber-dim:rgba(180,83,9,.10);--green:#047857;--green-dim:rgba(4,120,87,.10);--red:#b91c1c;--red-dim:rgba(185,28,28,.10)}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:15px;line-height:1.5;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:3px}
aside{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:background .3s,border-color .3s}
.logo{padding:14px 24px 12px;border-bottom:1px solid var(--border)}.brand-logo{display:block;width:198px;height:98px;object-fit:cover;object-position:center}
nav{flex:1;padding:18px 0;overflow-y:auto}
.nav-section-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted2);padding:14px 24px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 24px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:color .2s,background .2s;position:relative;text-decoration:none}
.nav-item:hover{color:var(--text);background:var(--accent-dim2)}.nav-item.active{color:var(--accent);background:var(--accent-dim2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{width:16px;height:16px;opacity:.7;flex-shrink:0}.nav-item.active .nav-icon{opacity:1}
.sidebar-profile{border-top:1px solid var(--border)}
.profile-btn{display:flex;align-items:center;gap:11px;padding:14px 18px;cursor:pointer;transition:background .2s;width:100%;border:none;background:none;color:var(--text);font-family:var(--font)}.profile-btn:hover{background:var(--accent-dim2)}
.profile-avatar{width:34px;height:34px;border-radius:9px;background:var(--accent-dim);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0}
.profile-info{flex:1;text-align:left}.profile-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}.profile-role{font-size:11.5px;color:var(--muted);margin-top:1px}
.profile-caret{width:14px;height:14px;color:var(--muted2);transition:transform .2s;flex-shrink:0}.profile-caret.open{transform:rotate(180deg)}
.profile-dropdown{background:var(--surface2);border-top:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s ease}.profile-dropdown.open{max-height:260px}
.pd-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all .15s;text-decoration:none}.pd-item:hover{color:var(--text);background:var(--accent-dim2)}.pd-item svg{width:14px;height:14px;flex-shrink:0;opacity:.75}
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;transition:background .2s}.theme-row:hover{background:var(--accent-dim2)}
.theme-row-left{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--muted)}.theme-row-left svg{width:14px;height:14px;opacity:.75}
.pill{width:34px;height:18px;border-radius:10px;background:var(--border2);position:relative;transition:background .3s;flex-shrink:0}.pill.on{background:var(--accent)}
.knob{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .3s}.pill.on .knob{transform:translateX(16px)}
.dd-divider{height:1px;background:var(--border);margin:3px 0}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;transition:background .3s,border-color .3s;z-index:10}
.topbar-left h1{font-size:18px;font-weight:600;letter-spacing:-.015em}.topbar-left p{font-size:12.5px;color:var(--muted);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:9px;flex-wrap:wrap;justify-content:flex-end}
.seg-ctrl{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:3px}
.seg-ctrl button{padding:5px 13px;border:none;background:none;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
.seg-ctrl button.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12);border:1px solid var(--border2)}
.top-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;outline:none;cursor:pointer}
.date-select{min-width:142px;color-scheme:dark}.light-mode .date-select{color-scheme:light}

/* MAP WRAPPER */
.map-wrapper{flex:1;position:relative;overflow:hidden}
#map{position:absolute;inset:0;width:100%;height:100%;z-index:1}

/* LEGEND */
.map-legend{position:absolute;left:16px;bottom:28px;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;backdrop-filter:blur(12px)}
.legend-title{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.legend-scale{display:flex;align-items:center;gap:8px}
.legend-bar{width:130px;height:10px;border-radius:6px;background:linear-gradient(90deg,rgba(30,40,80,.7),#00a8cc,#9b51e0,#ec4899)}
.legend-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);margin-top:4px;width:130px}
.legend-types{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.lt-row{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted)}
.lt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* MAP CONTROLS (floating top-left) */
.map-controls{position:absolute;left:16px;top:16px;z-index:500;display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.mc-group{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;width:40px;display:flex;flex-direction:column}
.mc-btn{display:flex;align-items:center;justify-content:center;width:40px;height:34px;background:none;border:none;color:var(--muted);cursor:pointer;transition:all .15s;font-size:16px;font-weight:700;line-height:1}
.mc-btn:hover{background:var(--accent-dim2);color:var(--text)}
.mc-btn+.mc-btn{border-top:1px solid var(--border)}
.reset-btn{width:auto;height:28px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:11px;font-weight:700}

/* Leaflet popup overrides */
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,.4)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--surface)!important}
.leaflet-popup-close-button{color:var(--muted)!important;top:8px!important;right:8px!important}

/* Custom popup inner */
.pop-inner{padding:14px 16px;min-width:200px}
.pop-zip{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent)}
.pop-name{font-size:12px;color:var(--muted);margin-top:1px}
.pop-divider{height:1px;background:var(--border);margin:10px 0}
.pop-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pop-row:last-child{margin-bottom:0}
.pop-label{font-size:11.5px;color:var(--muted)}
.pop-val{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--text)}

/* Opportunity popup */
.lead-pop{padding:14px 16px;min-width:220px}
.lead-name{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:8px}
.lead-line{display:block;font-size:12.5px;color:var(--muted);margin-top:5px;text-decoration:none}
.lead-line:hover{text-decoration:underline;color:var(--blue)}
.lead-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);margin-top:4px}
.heat-spot{filter:blur(6px);pointer-events:none}
</style>
</head>
<body>
<aside>
  <div class="logo"><img class="brand-logo" id="brand-logo" src="Dark.png" alt="sqoutiq"></div>
  <nav>
    <div class="nav-section-label">Overview</div>
    <a class="nav-item" href="/dash"><svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>Dashboard</a>
    <div class="nav-section-label">Intelligence</div>
    <a class="nav-item" href="/intel"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>Opportunity Intel</a>
    <a class="nav-item active" href="/map"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5z"/><circle cx="8" cy="6" r="1.5"/></svg>Map Insights</a>
    <div class="nav-section-label">Settings</div>
    <a class="nav-item" href="/settings"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42"/></svg>Settings</a>
  </nav>
  <div class="sidebar-profile">
    <button class="profile-btn" id="profile-btn"><div class="profile-avatar">V</div><div class="profile-info"><div class="profile-name">Viewer</div></div><svg class="profile-caret" id="profile-caret" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 6 8 10 12 6"/></svg></button>
    <div class="profile-dropdown" id="profile-dropdown">
      <a class="pd-item" href="/settings"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="5" r="3"/><path d="M1.5 14c0-3.5 3-5 6.5-5s6.5 1.5 6.5 5"/></svg>My Profile</a>
      <div class="theme-row" id="theme-toggle"><div class="theme-row-left"><svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><span id="theme-text">Dark Mode</span></div><div class="pill on" id="theme-pill"><div class="knob"></div></div></div>
      <div class="dd-divider"></div>
      <div class="pd-item" style="color:var(--red)" data-logout><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--red)"><path d="M11 3H13a1 1 0 011 1v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4a1 1 0 011-1h2"/><line x1="8" y1="1" x2="8" y2="10"/><polyline points="5 7 8 10 11 7"/></svg>Sign Out</div>
    </div>
  </div>
</aside>

<main>
  <div class="topbar">
    <div class="topbar-left">
      <h1>Map Insights</h1>
      <p>Live opportunity heatmap across active HVAC cities</p>
    </div>
    <div class="topbar-right">
      <div class="seg-ctrl" id="layer-filter"><button class="active" onclick="setLayer('heat',this)">Heatmap</button><button onclick="setLayer('pins',this)">Opportunity Pins</button><button onclick="setLayer('both',this)">Both</button></div><div class="seg-ctrl" id="map-time-filter"><button data-range="24h">24h</button><button data-range="48h">48h</button><button class="active" data-range="7d">7d</button></div><input class="top-select date-select" type="date" id="map-date-filter" aria-label="Show opportunities from exact date"><select class="top-select" id="region-select">

        <div class="lt-row"><div class="lt-dot" style="background:#9b51e0"></div>Score 90-100</div>

<script>
// ── Sidebar / Profile / Theme ─────────────────────────────────────────────
const pb=document.getElementById('profile-btn'),pd=document.getElementById('profile-dropdown'),pc=document.getElementById('profile-caret');
pb.addEventListener('click',e=>{e.stopPropagation();const o=pd.classList.toggle('open');pc.classList.toggle('open',o)});
document.addEventListener('click',()=>{pd.classList.remove('open');pc.classList.remove('open')});pd.addEventListener('click',e=>e.stopPropagation());
const THEME_STORAGE_KEY='sqoutiq-theme';
let isLight=false;
function applyTheme(light,persist=true){
  isLight=light;document.documentElement.classList.toggle('light-mode',light);
  if(persist){try{localStorage.setItem(THEME_STORAGE_KEY,light?'light':'dark')}catch(e){}}
  const pill=document.getElementById('theme-pill'),icon=document.getElementById('theme-icon'),txt=document.getElementById('theme-text'),logo=document.getElementById('brand-logo');
  if(light){pill.classList.remove('on');txt.textContent='Light Mode';if(logo)logo.src='Light.png';icon.innerHTML='<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';}
  else{pill.classList.add('on');txt.textContent='Dark Mode';if(logo)logo.src='Dark.png';icon.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';}
  // Swap map tile layer
  if(light){map.removeLayer(darkTile);lightTile.addTo(map);}
  else{map.removeLayer(lightTile);darkTile.addTo(map);}
}
document.getElementById('theme-toggle').addEventListener('click',()=>applyTheme(!isLight));

// ── Opportunity Map Data ─────────────────────────────
let allMapLeads=[];
let currentMapLeads=[];
let currentLayerMode='heat';

function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function phoneHref(phone){const digits=String(phone||'').replace(/\D/g,'');return digits ? `tel:${digits.length===10?'+1':''}${digits}` : '#'}
function mapHref(lead){return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(`${lead.address || ''}, ${lead.city || ''}, CA ${lead.zip || ''}`)}`}
function leadDate(lead){const raw=lead.batchTimeStamp || lead.timeStamp || lead.createdAt || lead.created_at || '';const date=raw ? new Date(raw) : null;return date && !Number.isNaN(date.getTime()) ? date : null}
function localDateKey(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`}
function selectedRange(){const active=document.querySelector('#map-time-filter button.active');return active ? active.dataset.range : '7d'}
function selectedRegion(){const select=document.getElementById('region-select');return select ? select.value : 'all'}
function selectedExactDate(){const input=document.getElementById('map-date-filter');return input ? input.value : ''}
function hasContactValue(value){const cleaned=String(value??'').trim().toLowerCase();return cleaned!==''&&cleaned!=='null'&&cleaned!=='undefined'&&cleaned!=='nan'}
function rangeHighValue(value){const text=String(value??'').toLowerCase();if(!hasContactValue(text))return 0;if(text.includes('million')||text.includes('mm')){const nums=text.match(/\d+(?:\.\d+)?/g)||[];return nums.length?Math.max(...nums.map(Number))*1000000:1000000}const nums=text.match(/\d[\d,]*/g)||[];return nums.length?Math.max(...nums.map(n=>Number(n.replace(/,/g,'')))):0}
function incomePoints(value){const high=rangeHighValue(value);if(high>=200000)return 7;if(high>=150000)return 6;if(high>=100000)return 5;if(high>=75000)return 4;if(high>=45000)return 3;if(high>0)return 1;return 0}
function netWorthPoints(value){const high=rangeHighValue(value);if(high>=1000000)return 7;if(high>=500000)return 5;if(high>=250000)return 4;if(high>=100000)return 3;if(high>0)return 1;return 0}
function calculateIntentScore(lead){const score=75+incomePoints(lead.incomeRange||lead.INCOME_RANGE||lead.INCOME||lead.ESTIMATED_HOUSEHOLD_INCOME)+netWorthPoints(lead.netWorth||lead.NET_WORTH||lead.ESTIMATED_NET_WORTH)+(hasContactValue(lead.phone||lead.SKIPTRACE_WIRELESS_NUMBERS)?8:0)+(hasContactValue(lead.email||lead.PERSONAL_VERIFIED_EMAIL||lead.PERSONAL_VERIFIED_EMAILS)?2:0);return Math.max(75,Math.min(score,99))}
function withCalculatedIntentScore(lead){const score=calculateIntentScore(lead);return{...lead,score,sig:score>=94?4:score>=86?3:score>=80?2:1}}
function filteredMapLeads(){let leads=allMapLeads.slice();const region=selectedRegion();if(region&&region!=='all')leads=leads.filter(lead=>lead.region===region);const exact=selectedExactDate();if(exact){return leads.filter(lead=>{const date=leadDate(lead);return date&&localDateKey(date)===exact})}const range=selectedRange();const cutoff=Date.now()-((range==='7d'?168:range==='48h'?48:24)*60*60*1000);return leads.filter(lead=>{const date=leadDate(lead);return date&&date.getTime()>=cutoff})}
function parsedCoordinate(value){if(value===null||value===undefined||String(value).trim()==='')return null;const number=Number(value);return Number.isFinite(number)?number:null}
function hasExactPoint(lead){const lat=parsedCoordinate(lead.lat),lng=parsedCoordinate(lead.lng);return lat!==null&&lng!==null&&lat>=24&&lat<=50&&lng>=-125&&lng<=-66}
function leadPoint(lead){if(!hasExactPoint(lead))return null;return{lat:parsedCoordinate(lead.lat),lng:parsedCoordinate(lead.lng)}}
function renderableMapEntries(leads=currentMapLeads){return leads.map(lead=>({lead,point:leadPoint(lead)})).filter(entry=>entry.point&&Number.isFinite(entry.point.lat)&&Number.isFinite(entry.point.lng))}
function heatColor(score){return score>=90?'#ec4899':score>=80?'#9b51e0':'#00a8cc'}

const darkTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',subdomains:'abcd',maxZoom:19});
const lightTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',subdomains:'abcd',maxZoom:19});
const map=L.map('map',{center:[33.79,-117.18],zoom:10,zoomControl:false,attributionControl:true});
darkTile.addTo(map);
map.attributionControl.setPrefix('');
const heatLayer=L.layerGroup();
const leadMarkerGroup=L.layerGroup();
heatLayer.addTo(map);

function addHeatSpot(entry){const {lead,point}=entry;const score=Number(lead.score)||75;const inner=L.circleMarker([point.lat,point.lng],{radius:score>=90?18:score>=80?15:12,stroke:false,fill:true,fillColor:heatColor(score),fillOpacity:.45,interactive:false,className:'heat-spot'});const outer=L.circleMarker([point.lat,point.lng],{radius:score>=90?34:score>=80?28:22,stroke:false,fill:true,fillColor:'#00a8cc',fillOpacity:.16,interactive:false,className:'heat-spot'});heatLayer.addLayer(outer);heatLayer.addLayer(inner)}
function addLeadMarker(entry){const {lead,point}=entry;const {lat,lng}=point;const icon=L.divIcon({className:'',html:`<div style="width:22px;height:22px;background:#00a8cc;border:2px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,168,204,0.45)"><div style="transform:rotate(45deg);width:100%;height:100%;display:flex;align-items:center;justify-content:center"><svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2.5"><path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5z"/><circle cx="8" cy="6" r="1.5" fill="#fff" stroke="none"/></svg></div></div>`,iconSize:[22,22],iconAnchor:[11,22],popupAnchor:[0,-24]});const scColor=lead.score>=90?'#9b51e0':lead.score>=80?'#f59e0b':'#9ca3af';const marker=L.marker([lat,lng],{icon});marker.bindPopup(`<div class="lead-pop"><div class="lead-name">${escapeHtml(lead.name)}</div>${lead.email?`<a class="lead-line" href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</a>`:'<span class="lead-line">No email</span>'}${lead.phone?`<a class="lead-line" href="${phoneHref(lead.phone)}">${escapeHtml(lead.phone)}</a>`:'<span class="lead-line">No phone</span>'}${lead.address?`<a class="lead-line" href="${mapHref(lead)}" target="_blank" rel="noopener">${escapeHtml(lead.address)}, ${escapeHtml(lead.city)} ${escapeHtml(lead.zip)}</a>`:'<span class="lead-line">No address</span>'}<div style="display:flex;align-items:center;gap:8px;margin-top:10px"><span style="font-size:11px;color:var(--muted)">Intent Score</span><span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:${scColor}">${lead.score}</span></div></div>`,{maxWidth:280});leadMarkerGroup.addLayer(marker)}
function applyLayerMode(){if(currentLayerMode==='heat'){heatLayer.addTo(map);map.removeLayer(leadMarkerGroup)}else if(currentLayerMode==='pins'){map.removeLayer(heatLayer);leadMarkerGroup.addTo(map)}else{heatLayer.addTo(map);leadMarkerGroup.addTo(map)}}
function renderMap(){currentMapLeads=filteredMapLeads();const entries=renderableMapEntries(currentMapLeads).sort((a,b)=>{const aTime=leadDate(a.lead)?.getTime?.()||0;const bTime=leadDate(b.lead)?.getTime?.()||0;return bTime-aTime});leadMarkerGroup.clearLayers();heatLayer.clearLayers();entries.forEach(entry=>{addHeatSpot(entry);addLeadMarker(entry)});applyLayerMode();map.invalidateSize();setTimeout(()=>map.invalidateSize(),60)}
async function loadLiveMap(){if(!window.SqoutiqData||!SqoutiqData.isConfigured())return;try{allMapLeads=(await SqoutiqData.fetchLeads()).map(withCalculatedIntentScore);console.info(`Map opportunities loaded: ${allMapLeads.length}`);renderMap()}catch(error){console.warn('Map data load failed',error)}}
loadLiveMap();
setInterval(loadLiveMap,60000);

// ── Layer toggling ─────────────────────────────────────────────────────────
function setLayer(mode,button){
  currentLayerMode=mode;
  document.querySelectorAll('#layer-filter button').forEach(b=>b.classList.remove('active'));
  if(button) button.classList.add('active');
  applyLayerMode();
}

// ── Region jump ─────────────────────────────────────────────────────────────
const regions={all:[32.2,-101.5,5],murrieta:[33.5539,-117.2139,12],temecula:[33.4936,-117.1484,12],menifee:[33.6971,-117.1853,12],perris:[33.7825,-117.2286,12],riverside:[33.9806,-117.3755,11],oceanside:[33.1959,-117.3795,12],corona:[33.8753,-117.5664,12],lake_elsinore:[33.6681,-117.3273,12],moreno_valley:[33.9425,-117.2297,12],opelika:[32.6454,-85.3783,12],san_antonio:[29.617,-98.536,11]};
function jumpToRegion(r){const [lat,lng,z]=regions[r]||regions.all;map.setView([lat,lng],z);}

document.querySelectorAll('#map-time-filter button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#map-time-filter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const dateInput=document.getElementById('map-date-filter');
    if(dateInput) dateInput.value='';
    renderMap();
  });
});
document.getElementById('map-date-filter').addEventListener('change',renderMap);
document.getElementById('region-select').addEventListener('change',event=>{jumpToRegion(event.target.value);renderMap();});
try{applyTheme(localStorage.getItem(THEME_STORAGE_KEY)==='light',false)}catch(e){applyTheme(false,false)}
</script>
</body>
</html>
