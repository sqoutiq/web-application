name: Audience Labs Supabase Router

on:
  workflow_dispatch:


jobs:
  route-audience-labs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Audience Labs router
        env:
          AUDIENCE_LABS_API_KEY: ${{ secrets.AUDIENCE_LABS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TYPE_SUFFIX: hvac
        run: python audience_labs_supabase_router.py
